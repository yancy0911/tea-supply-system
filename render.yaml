# Release 仅 migrate，避免 import_products_ready 在发布阶段长时间占库/超时导致 Deploying 卡住。
# 商品数据请用后台 Product → Import 上传 data/products_import_ready.csv，或 Shell 手动跑 import_products_ready。
services:
  - type: web
    name: tea-supply-web
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn tea_supply.wsgi:application --bind 0.0.0.0:$PORT
    releaseCommand: python manage.py migrate --noinput
