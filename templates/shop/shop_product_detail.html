<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{{ product_row.name }} — Boba Supply</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    {{ product_row|json_script:"shop-product-data" }}
    <style>
      :root {
        --accent: #15803d;
        --accent-soft: #ecfdf5;
        --muted: #6b7280;
        --border: #e5e7eb;
        --card: #ffffff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
        background: #f3f4f6;
        color: #111827;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .pd-top {
        position: sticky;
        top: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
      }
      .pd-back {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        border: 1px solid var(--border);
        text-decoration: none;
        color: #334155;
        font-weight: 700;
        font-size: 18px;
        background: #fff;
      }
      .pd-title {
        font-weight: 800;
        font-size: 16px;
        letter-spacing: -0.02em;
      }
      .pd-spacer {
        flex: 1;
      }
      .pd-user {
        font-size: 12px;
        color: var(--muted);
        max-width: 42%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pd-wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 12px 12px 28px;
      }
      .pd-card {
        background: var(--card);
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid rgba(0, 0, 0, 0.05);
        box-shadow: 0 8px 32px rgba(15, 23, 42, 0.08);
      }
      .imgbox {
        background: #f8fafc;
        aspect-ratio: 1;
        max-height: 420px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .imgbox img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .pd-content {
        padding: 18px 16px 22px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 800;
        line-height: 1.35;
        letter-spacing: -0.02em;
      }
      .sku {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 12px;
      }
      .spec {
        font-size: 13px;
        color: #475569;
        line-height: 1.65;
        margin-bottom: 14px;
      }
      .price-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 12px;
        padding: 12px;
        border-radius: 14px;
        background: #f8fafc;
        border: 1px solid #eef2f7;
      }
      .big-price {
        font-size: 22px;
        font-weight: 900;
        color: var(--accent);
        letter-spacing: -0.03em;
      }
      .case-price {
        font-size: 16px;
        font-weight: 700;
        color: #64748b;
      }
      .tag {
        display: inline-block;
        margin-top: 8px;
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        background: #f1f5f9;
        color: #475569;
      }
      .mode {
        display: flex;
        gap: 8px;
        margin: 14px 0;
        flex-wrap: wrap;
      }
      .mode label {
        flex: 1;
        min-width: 120px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 2px solid var(--border);
        background: #fafafa;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        text-align: center;
      }
      .mode label:has(input:checked) {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: var(--accent);
      }
      .mode input {
        margin-right: 6px;
        accent-color: var(--accent);
      }
      .qty {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        margin: 16px 0;
        border: 2px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        max-width: 200px;
        background: #fff;
      }
      .qty button {
        width: 44px;
        height: 44px;
        border: none;
        background: #f8fafc;
        cursor: pointer;
        font-size: 22px;
        font-weight: 700;
        color: #334155;
      }
      .qty input {
        flex: 1;
        min-width: 0;
        text-align: center;
        border: none;
        border-left: 2px solid var(--border);
        border-right: 2px solid var(--border);
        font-size: 17px;
        font-weight: 800;
        padding: 10px 8px;
      }
      .btn {
        width: 100%;
        padding: 15px 18px;
        border: 1px solid #166534;
        border-radius: 14px;
        background: linear-gradient(180deg, #22c55e 0%, var(--accent) 100%);
        color: #fff;
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        margin-top: 6px;
        box-shadow: 0 8px 22px rgba(21, 128, 61, 0.3);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        box-shadow: none;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 10px;
        line-height: 1.45;
      }
      .acct-banner {
        background: #fffbeb;
        color: #92400e;
        border: 1px solid #fde68a;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 13px;
        margin: 0 12px 12px;
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
      }
    </style>
  </head>
  <body>
    <header class="pd-top">
      <a href="{% url 'shop-home' %}" class="pd-back" aria-label="返回商城">←</a>
      <span class="pd-title">商品详情</span>
      <span class="pd-spacer"></span>
      {% if shop_customer %}
        <span class="pd-user">{{ shop_customer.name }}</span>
      {% endif %}
    </header>
    <div class="pd-wrap">
      {% if shop_customer and shop_order_block_hint %}
        <div class="acct-banner">{{ shop_order_block_hint }}</div>
      {% endif %}
      <div class="pd-card">
        <div class="imgbox">
          <img id="pimg" src="" alt="" />
        </div>
        <div class="pd-content">
          <h1 id="pname"></h1>
          <div class="sku" id="psku"></div>
          <div class="spec" id="pspec"></div>
          <div class="price-row" id="pprice"></div>
          <div class="tag" id="pnote"></div>
          <div class="mode" id="pmode"></div>
          <div class="qty">
            <button type="button" id="bminus" aria-label="减少">−</button>
            <input type="number" id="pqty" min="0.01" step="0.01" value="1" />
            <button type="button" id="bplus" aria-label="增加">+</button>
          </div>
          <button
            type="button"
            class="btn"
            id="padd"
            {% if shop_customer and not shop_can_order %}
              disabled
              title="{{ shop_order_block_hint|default:'This account is suspended. Please contact us.' }}"
            {% elif product_row.stock_enabled and product_row.is_out_of_stock %}
              disabled
              title="缺货，无法加入购物车"
            {% endif %}
          >
            加入购物车
          </button>
          <p class="hint">加入后可从商城购物车前往结账，填写收货信息并下单。</p>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var shopCanOrder = {% if shop_can_order %}true{% else %}false{% endif %};
        var shopLoggedIn = {% if shop_customer %}true{% else %}false{% endif %};
        var shopOrderBlockHint = "{{ shop_order_block_hint|default:''|escapejs }}";
        var p = {};
        try {
          var el = document.getElementById("shop-product-data");
          if (el && el.textContent) p = JSON.parse(el.textContent) || {};
        } catch (e) {}

        var PLACEHOLDER =
          "data:image/svg+xml," +
          encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300"><rect fill="#e2e8f0" width="400" height="300"/><text x="200" y="150" text-anchor="middle" fill="#94a3b8" font-size="16">No image</text></svg>'
          );

        function fmtMoney(n) {
          var x = parseFloat(n);
          if (isNaN(x)) return "0.00";
          return x.toFixed(2);
        }

        var CJK_RE = /[\u4e00-\u9fff]/;
        function containsCjk(s) {
          return CJK_RE.test(String(s || ""));
        }
        function priceNoteEn(raw) {
          if (raw == null || raw === "") return "";
          if (containsCjk(raw)) return "";
          return String(raw);
        }

        function getCart() {
          try {
            var raw = localStorage.getItem("cart");
            if (!raw) return [];
            var parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
          } catch (e) {
            try {
              localStorage.removeItem("cart");
            } catch (e2) {}
            return [];
          }
        }

        function saveCart(c) {
          try {
            localStorage.setItem("cart", JSON.stringify(c));
          } catch (e) {}
        }

        function lineKey(line) {
          var sku = String(line.sku != null ? line.sku : "").trim().toUpperCase();
          var st = line.sale_type === "case" ? "case" : "single";
          if (!sku) return String(line.product_id) + "_" + st;
          return sku + "_" + st;
        }

        function needUnitsForProduct(pid, p, lines) {
          var t = 0;
          lines.forEach(function (l) {
            if (Number(l.product_id) !== Number(pid)) return;
            if (l.sale_type === "case") t += parseFloat(l.quantity) * (parseFloat(p.units_per_case) || 1);
            else t += parseFloat(l.quantity);
          });
          return t;
        }

        function sellableStockUnits(pr) {
          if (!pr || !pr.stock_enabled) return null;
          var raw =
            pr.sellable_stock != null
              ? pr.sellable_stock
              : pr.current_stock != null
                ? pr.current_stock
                : pr.stock_quantity;
          if (raw === null || raw === undefined) return 0;
          var v = parseFloat(raw);
          return isNaN(v) ? 0 : v;
        }

        function maxQtyForDetailAdd(pid, pr, st, cart) {
          var sell = sellableStockUnits(pr);
          if (sell === null) return Infinity;
          var other = needUnitsForProduct(pid, pr, cart);
          var rem = Math.max(0, sell - other);
          var upc = parseFloat(pr.units_per_case) || 1;
          if (st === "case") return Math.floor(rem / upc + 1e-9);
          return rem;
        }

        var img = document.getElementById("pimg");
        img.src = p.image_url && p.image_url.length ? p.image_url : PLACEHOLDER;
        img.onerror = function () {
          this.onerror = null;
          this.src = PLACEHOLDER;
        };

        document.getElementById("pname").textContent = p.name || "";
        document.getElementById("psku").textContent = "SKU: " + (p.sku || "");
        function specOrDash(v) {
          var s = (v || "").trim();
          if (!s) return "—";
          return containsCjk(s) ? "—" : s;
        }
        function stockStatusZh() {
          if (!p.stock_enabled) return "库存未跟踪（可下单）";
          var s = parseFloat(p.sellable_stock != null ? p.sellable_stock : p.current_stock);
          if (isNaN(s)) s = 0;
          var safety = parseFloat(p.safety_stock) || 0;
          var tag =
            s <= 0 ? '<span style="color:#b91c1c;font-weight:700">缺货</span>' : s <= safety
              ? '<span style="color:#c2410c;font-weight:700">库存紧张</span>'
              : '<span style="color:#15803d;font-weight:700">有货</span>';
          return "当前库存：" + fmtMoney(s) + " · 库存状态：" + tag;
        }
        document.getElementById("pspec").innerHTML =
          "分类：" +
          (p.category_name && String(p.category_name).trim() && !containsCjk(p.category_name)
            ? p.category_name
            : "—") +
          "<br/>规格（袋）：" +
          specOrDash(p.unit_label) +
          "<br/>规格（箱）：" +
          specOrDash(p.case_label) +
          "<br/>" +
          stockStatusZh();

        var priceHtml = "";
        if (p.price_on_request) {
          priceHtml = '<span class="big-price">Quote required</span>';
        } else {
          priceHtml +=
            '<div><span class="big-price">{{ currency_symbol }}' +
            fmtMoney(p.display_single) +
            '</span> <small style="color:#94a3b8;font-weight:600">Per Bag</small></div>';
          priceHtml +=
            '<div><span class="case-price">{{ currency_symbol }}' +
            fmtMoney(p.display_case) +
            '</span> <small style="color:#94a3b8;font-weight:600">Per Case</small></div>';
        }
        document.getElementById("pprice").innerHTML = priceHtml;
        var pnoteEl = document.getElementById("pnote");
        var pnoteTxt = p.price_on_request ? "Price TBD" : priceNoteEn(p.price_note || "");
        pnoteEl.textContent = pnoteTxt;
        pnoteEl.style.display = pnoteTxt ? "" : "none";

        var canSingle = p.can_split_sale && p.can_quote_single;
        var canCase = p.can_quote_case;
        var modeHtml = "";
        if (canSingle) {
          modeHtml +=
            '<label><input type="radio" name="sale" value="single" checked /> Single</label>';
        }
        if (canCase) {
          modeHtml +=
            '<label><input type="radio" name="sale" value="case" ' +
            (!canSingle ? "checked" : "") +
            " /> Case</label>";
        }
        if (!modeHtml) modeHtml = "<span style='color:#b45309'>No price available</span>";
        document.getElementById("pmode").innerHTML = modeHtml;

        var minQ = Math.max(parseFloat(p.minimum_order_qty) || 0.01, 0.01);
        var qIn = document.getElementById("pqty");
        qIn.value = minQ;
        qIn.min = minQ;

        function unitPrice() {
          var sale = document.querySelector('input[name="sale"]:checked');
          var st = sale ? sale.value : "single";
          if (st === "case") return parseFloat(p.display_case) || 0;
          return parseFloat(p.display_single) || 0;
        }

        function saleType() {
          var sale = document.querySelector('input[name="sale"]:checked');
          return sale && sale.value === "case" ? "case" : "single";
        }

        document.getElementById("bminus").onclick = function () {
          var v = parseFloat(qIn.value) || 0;
          qIn.value = Math.max(minQ, v - 1);
        };
        document.getElementById("bplus").onclick = function () {
          var v = parseFloat(qIn.value) || 0;
          var st = saleType();
          var cart = getCart();
          var pid = Number(p.id);
          var maxQ = maxQtyForDetailAdd(pid, p, st, cart);
          var next = v + 1;
          if (maxQ !== Infinity && next > maxQ + 1e-9) {
            if (maxQ <= 0) alert("库存不足。");
            else alert("库存不足，最多可订购约 " + (st === "case" ? maxQ + " 箱" : maxQ + " 袋") + "。");
            qIn.value = Math.min(v, maxQ);
            return;
          }
          qIn.value = next;
        };

        document.getElementById("padd").onclick = function () {
          if (shopLoggedIn && !shopCanOrder) {
            alert(shopOrderBlockHint || "Ordering is not available for your account.");
            return;
          }
          if (p.price_on_request) {
            alert("This product requires a quote.");
            return;
          }
          var st = saleType();
          if (st === "single" && !p.can_split_sale) {
            alert("Case pack only — please choose case.");
            return;
          }
          if (st === "single" && !p.can_quote_single) {
            alert("No single-unit price.");
            return;
          }
          if (st === "case" && !p.can_quote_case) {
            alert("No case price.");
            return;
          }
          var sell0 = sellableStockUnits(p);
          if (sell0 !== null && sell0 <= 0) {
            alert("缺货，无法加入购物车。");
            return;
          }
          var qty = parseFloat(qIn.value);
          if (isNaN(qty) || qty < minQ) {
            alert("Quantity must be at least MOQ " + minQ);
            return;
          }
          var unit = unitPrice();
          if (unit <= 0) {
            alert("Invalid price");
            return;
          }
          var cart = getCart();
          var pid = Number(p.id);
          var wantKey = lineKey({ sku: p.sku, sale_type: st, product_id: pid });
          var sim = cart.map(function (l) {
            return { product_id: l.product_id, sale_type: l.sale_type, quantity: l.quantity };
          });
          var fi = sim.findIndex(function (l) {
            return Number(l.product_id) === Number(pid) && String(l.sale_type) === String(st);
          });
          if (fi >= 0) sim[fi].quantity = parseFloat(sim[fi].quantity) + qty;
          else sim.push({ product_id: pid, sale_type: st, quantity: qty });
          var needAfter = needUnitsForProduct(pid, p, sim);
          var avail = sellableStockUnits(p);
          if (avail !== null && needAfter > avail + 1e-6) {
            alert("库存不足。可用约 " + avail + "（库存单位）。");
            return;
          }
          var found = null;
          for (var ci = 0; ci < cart.length; ci++) {
            if (lineKey(cart[ci]) === wantKey) {
              found = cart[ci];
              break;
            }
          }
          if (found) {
            found.qty = (parseFloat(found.qty) || parseFloat(found.quantity) || 0) + qty;
            found.quantity = found.qty;
            found.unit_price = parseFloat(found.unit_price) || parseFloat(found.price) || unit;
            found.price = found.unit_price;
            found.subtotal = found.quantity * found.unit_price;
          } else {
            cart.push({
              product_id: pid,
              sku: String(p.sku != null ? p.sku : ""),
              name: p.name || "",
              price: unit,
              qty: qty,
              quantity: qty,
              sale_type: st,
              unit_price: unit,
              price_note: p.price_note,
              min_qty: minQ,
              spec_label: st === "case" ? "Per Case" : "Per Bag",
              spec_detail: st === "case" ? p.case_label || "—" : p.unit_label || "—",
              subtotal: qty * unit,
            });
          }
          saveCart(cart);
          alert("Added to cart");
          window.location.href = "/shop/#shop-cart-anchor";
        };
      })();
    </script>
  </body>
</html>
