<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>
  </head>
  <body>
    <h1>Register</h1>
    {% if error %}
      <p style="color: red">{{ error }}</p>
    {% endif %}
    <form method="post" action="{% url 'register' %}">
      {% csrf_token %}
      <p>
        <label>Username<br /><input type="text" name="username" maxlength="150" required /></label>
      </p>
      <p>
        <label>Password<br /><input type="password" name="password" required /></label>
      </p>
      <p>
        <label>Confirm password<br /><input type="password" name="confirm" required /></label>
      </p>
      <p><button type="submit">Register</button></p>
    </form>
    <p><a href="{% url 'login' %}">Already have an account? Sign in</a> · <a href="/shop/">Back to shop</a></p>
  </body>
</html>
