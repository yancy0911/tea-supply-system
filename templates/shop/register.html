<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>用户注册</title>
    <style>
      body { margin: 0; background: #f3f4f6; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif; }
      .wrap { max-width: 420px; margin: 40px auto; background: #fff; padding: 22px; border-radius: 12px; box-shadow: 0 2px 14px rgba(0,0,0,.07); }
      h2 { margin: 0 0 14px; }
      label { display: block; margin: 10px 0 6px; color: #555; font-size: 13px; }
      input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
      button { width: 100%; margin-top: 14px; background: #ff5000; color: #fff; border: 0; padding: 10px 0; border-radius: 8px; font-weight: 700; }
      .hint { margin-top: 10px; font-size: 13px; color: #6b7280; text-align: center; }
      .msg { margin-bottom: 8px; color: #b91c1c; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>用户注册</h2>
      {% if messages %}
        {% for message in messages %}
          <div class="msg">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <label>用户名</label>
        <input type="text" name="username" maxlength="150" required />
        <label>密码</label>
        <input type="password" name="password" required />
        <label>确认密码</label>
        <input type="password" name="confirm_password" required />
        <button type="submit">注册并登录</button>
      </form>
      <div class="hint">已有账号？<a href="{% url 'login' %}">去登录</a></div>
    </div>
  </body>
</html>
