<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Boba Supply — Demo</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
        line-height: 1.6;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      h1 {
        font-size: 28px;
        margin: 0 0 12px;
      }
      p {
        margin: 0 0 16px;
        color: #475569;
      }
      .cta {
        display: inline-block;
        margin-top: 8px;
        padding: 12px 20px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
      }
      .cta:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Wholesale boba supply</h1>
      <p>
        This is a demo landing page. Explore the wholesale shop, staff portal, and reports from the main navigation.
      </p>
      <a class="cta" href="/shop/">Open shop</a>
      <a class="cta" href="/" style="background: #334155; margin-left: 8px">Staff portal</a>
    </div>
  </body>
</html>
