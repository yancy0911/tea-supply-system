{% extends "base.html" %}

{% block content %}
  <h2 style="margin: 0 0 12px 0">Sign in</h2>
  <div class="form-card">
    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom: 10px">
        <div class="muted" style="font-size: 14px; margin-bottom: 6px">Username</div>
        {{ form.username }}
      </div>
      <div style="margin-bottom: 10px">
        <div class="muted" style="font-size: 14px; margin-bottom: 6px">Password</div>
        {{ form.password }}
      </div>
      <button class="btn" type="submit" style="width: 100%; text-align: center">Sign in</button>
      {% if form.errors %}
        <div class="error">Invalid username or password</div>
      {% endif %}
    </form>
  </div>
{% endblock %}
