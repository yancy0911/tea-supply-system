<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>奶茶供应系统</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        margin: 0;
        background: #f6f7fb;
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .topbar {
        background: #111827;
        color: #fff;
        padding: 14px 0;
      }
      .topbar .inner {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .topbar a {
        color: #fff;
        text-decoration: none;
      }
      .nav {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .nav a {
        color: rgba(255, 255, 255, 0.9);
      }
      .card-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin: 16px 0;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
      }
      .card .label {
        color: #6b7280;
        font-size: 13px;
      }
      .card .value {
        font-size: 26px;
        margin-top: 8px;
        font-weight: 700;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 12px;
      }
      .table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
      }
      .table th,
      .table td {
        padding: 10px 12px;
        border-bottom: 1px solid #eef2f7;
        text-align: left;
        font-size: 14px;
      }
      .muted {
        color: #6b7280;
      }
      .btn {
        display: inline-block;
        background: #2563eb;
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        text-decoration: none;
      }
      .btn.secondary {
        background: #374151;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        outline: none;
      }
      .form-card {
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
        max-width: 420px;
        margin: 0 auto;
      }
      .error {
        color: #dc2626;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="inner">
        <div style="font-weight: 800; font-size: 16px">奶茶供应系统</div>
        <div class="nav">
          <a href="/shop/">客户商城</a>
          {% if user.is_authenticated and user.is_staff %}
          <a href="/">店员录单</a>
          <a href="/orders/">订单</a>
          <a href="/reports/">报表</a>
          {% if user.is_superuser %}
          <a href="/inventory/">库存</a>
          <a href="/replenishment/">补货预警</a>
          <a href="/admin/">后台管理</a>
          {% endif %}
          {% endif %}
        </div>
        <div style="margin-left: auto">
          {% if user.is_authenticated %}
          <span class="muted" style="margin-right: 10px">你好，{{ user.username }}</span>
          <a class="btn secondary" href="/logout/">退出</a>
          {% else %}
          <a class="btn" href="/login/">登录</a>
          <a class="btn secondary" href="/register/" style="margin-left: 8px">注册</a>
          {% endif %}
        </div>
      </div>
    </div>
    <div class="container">{% block content %}{% endblock %}</div>
  </body>
</html>
